name: VyperXRat

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Android Project Structure
      run: |
        echo "📂 Creating proper Android structure..."
        
        # Buat folder yang diperlukan
        mkdir -p app/src/main/java/com/vyper/rat
        mkdir -p app/src/main/res/drawable
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        mkdir -p app/src/main/res/values
        
        # Pindahkan file ke struktur standar
        echo "📦 Moving files..."
        
        # AndroidManifest.xml
        if [ -f "AndroidManifest.xml" ]; then
          mv AndroidManifest.xml app/src/main/
        fi
        
        # MainActivity.java
        if [ -f "MainActivity.java" ]; then
          mv MainActivity.java app/src/main/java/com/vyper/rat/
        fi
        
        # Icon
        if [ -f "icon/icon.png" ]; then
          cp icon/icon.png app/src/main/res/drawable/icon.png
          cp icon/icon.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp icon/icon.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp icon/icon.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp icon/icon.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp icon/icon.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        fi
        
        # Buat file values/colors.xml
        cat > app/src/main/res/values/colors.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <color name="colorPrimary">#3F51B5</color>
    <color name="colorPrimaryDark">#303F9F</color>
    <color name="colorAccent">#FF4081</color>
</resources>
EOF
        
        # Buat file values/strings.xml
        cat > app/src/main/res/values/strings.xml << 'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <string name="app_name">VyperXRat</string>
</resources>
EOF
        
        # Pindahkan build.gradle ke app/
        if [ -f "build.gradle" ]; then
          mv build.gradle app/build.gradle
        fi
        
        # Buat root build.gradle
        cat > build.gradle << 'EOF'
// Top-level build file
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}
EOF
        
        # Settings.gradle
        if [ ! -f "settings.gradle" ]; then
          echo 'include ":app"' > settings.gradle
        fi
        
        echo "📂 Final structure:"
        find . -type f -name "*.java" -o -name "*.xml" -o -name "*.gradle" -o -name "*.png" | head -30

    - name: Build Android APK
      run: |
        echo "🔨 Creating gradle wrapper..."
        gradle wrapper
        
        chmod +x gradlew
        
        echo "🔨 Starting build..."
        ./gradlew assembleDebug --stacktrace

    - name: Find and Upload APK
      run: |
        echo "🔍 Looking for APK files..."
        APK_PATH=$(find . -path "*/build/outputs/apk/debug/*.apk" -type f | head -1)
        
        if [ -n "$APK_PATH" ]; then
          echo "✅ APK found at: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
        else
          echo "❌ No APK found!"
          find . -name "*.apk" -type f || echo "No APK anywhere"
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VyperXRatl-APK
        path: "**/build/outputs/apk/debug/*.apk"